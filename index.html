<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrenos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg: #0e0e0e; --card: #181818; --card2: #1f1f1f; --border: #2a2a2a;
    --orange: #e85d26; --gold: #f0a030; --green: #2ecc71; --red: #e74c3c;
    --text: #e8e8e8; --muted: #666; --muted2: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  /* NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 200; }
  .nav-btn { flex: 1; padding: 12px 4px 10px; border: none; background: none; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 0.65rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s; }
  .nav-btn .nav-icon { font-size: 1.3rem; }
  .nav-btn.active { color: var(--orange); }

  .page { display: none; }
  .page.active { display: block; }

  /* HEADER */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 0.06em; color: #fff; }
  .header-sub { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px; }

  /* WORKOUT PAGE */
  .workout-body { padding: 16px; }

  .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

  .day-btn-sel {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 0.75rem;
    font-weight: 600; padding: 12px 10px; cursor: pointer; text-align: left;
    transition: all 0.15s;
  }
  .day-btn-sel:hover { border-color: var(--orange); }
  .day-btn-sel.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .day-btn-sel .dbs-num { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; line-height: 1; margin-bottom: 3px; color: var(--muted2); }
  .day-btn-sel.active .dbs-num { color: rgba(255,255,255,0.7); }
  .day-btn-sel .dbs-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.3; }

  /* EXERCISE CARDS */
  .ex-card { background: var(--card); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border-left: 3px solid var(--border); }
  .ex-card.has-data { border-left-color: var(--orange); }

  .ex-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
  .ex-title { font-weight: 600; font-size: 0.9rem; color: #fff; }
  .ex-target { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .ex-summary { font-size: 0.72rem; color: var(--orange); margin-top: 2px; display: none; }
  .ex-card.has-data .ex-summary { display: block; }
  .ex-chevron { color: var(--muted2); font-size: 0.85rem; transition: transform 0.2s; flex-shrink: 0; }
  .ex-card.open .ex-chevron { transform: rotate(180deg); }

  .ex-body { display: none; padding: 0 14px 14px; }
  .ex-card.open .ex-body { display: block; }

  .sets-list { margin-bottom: 8px; }
  .set-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .set-row:last-child { border-bottom: none; }
  .set-num { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: var(--orange); min-width: 22px; }
  .set-fields { display: flex; gap: 6px; flex: 1; }
  .set-input { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.88rem; padding: 7px 8px; width: 100%; text-align: center; }
  .set-input:focus { outline: none; border-color: var(--orange); }
  .set-input::placeholder { color: var(--muted2); font-size: 0.75rem; }
  .btn-del-set { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 0.9rem; padding: 2px 4px; }
  .btn-del-set:hover { color: var(--red); }

  .btn-add-set { width: 100%; background: transparent; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 0.78rem; padding: 7px; cursor: pointer; margin-bottom: 8px; transition: all 0.15s; }
  .btn-add-set:hover { border-color: var(--orange); color: var(--orange); }

  .ex-prev { font-size: 0.7rem; color: var(--muted); padding: 4px 0; border-top: 1px solid var(--border); margin-top: 4px; }
  .ex-prev span { color: var(--green); font-weight: 600; }

  /* SAVE BTN */
  .save-section { padding: 0 16px; margin-top: 4px; }
  .btn-save { width: 100%; background: var(--orange); border: none; border-radius: 12px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 0.06em; padding: 14px; cursor: pointer; text-transform: uppercase; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.9; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-status { text-align: center; font-size: 0.75rem; margin-top: 8px; color: var(--muted); }
  .save-status.ok { color: var(--green); }
  .save-status.err { color: var(--red); }

  /* HISTORY PAGE */
  .history-body { padding: 16px; }

  .btn-load { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.85rem; padding: 12px; cursor: pointer; margin-bottom: 16px; transition: border-color 0.15s; }
  .btn-load:hover { border-color: var(--orange); }

  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .filter-btn { flex-shrink: 0; background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 0.72rem; font-weight: 600; padding: 5px 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

  .history-entry { background: var(--card); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .history-date { padding: 10px 14px; background: var(--card2); font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: flex; justify-content: space-between; align-items: center; }
  .history-day-name { font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--orange); letter-spacing: 0.04em; }
  .history-ex { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .history-ex:last-child { border-bottom: none; }
  .history-ex-name { font-size: 0.85rem; color: var(--text); }
  .history-ex-detail { font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; color: var(--muted); text-align: right; }
  .history-ex-detail strong { color: var(--green); }

  /* PROGRESS PAGE */
  .progress-body { padding: 16px; }
  .progress-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }

  .ex-select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.88rem; padding: 10px 12px; margin-bottom: 14px; appearance: none; }
  .ex-select:focus { outline: none; border-color: var(--orange); }

  .progress-chart { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 14px; min-height: 160px; }
  .chart-empty { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 40px 0; }

  .progress-bars { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
  .progress-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .progress-bar-col { width: 100%; background: var(--orange); border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.4s ease; }
  .progress-bar-label { font-size: 0.6rem; color: var(--muted); text-align: center; white-space: nowrap; }
  .progress-bar-val { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--orange); }

  .pr-card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
  .pr-icon { font-size: 1.8rem; }
  .pr-info { flex: 1; }
  .pr-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 2px; }
  .pr-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 700; color: #fff; }
  .pr-date { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

  .empty-state { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 32px 0; }

  .toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%) translateY(60px); background: #222; color: #fff; border-radius: 20px; padding: 9px 18px; font-size: 0.82rem; transition: transform 0.25s ease; z-index: 999; white-space: nowrap; border: 1px solid var(--border); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- PAGE: ENTRENO -->
<div class="page active" id="page-workout">
  <div class="header">
    <h1>💪 Entreno</h1>
    <div class="header-sub" id="workout-date"></div>
  </div>
  <div class="workout-body">
    <div class="day-grid" id="day-grid"></div>
    <div id="exercise-list"><div class="empty-state">Selecciona un día para empezar 💪</div></div>
  </div>
  <div class="save-section">
    <button class="btn-save" id="btn-save" onclick="saveWorkout()" disabled>💾 Guardar en Google Sheets</button>
    <div class="save-status" id="save-status"></div>
  </div>
</div>

<!-- PAGE: HISTORIAL -->
<div class="page" id="page-history">
  <div class="header">
    <h1>📋 Historial</h1>
    <div class="header-sub">Todos tus entrenos guardados</div>
  </div>
  <div class="history-body">
    <button class="btn-load" onclick="loadHistory()">🔄 Cargar desde Google Sheets</button>
    <div class="filter-row" id="filter-row" style="display:none"></div>
    <div id="history-list"><div class="empty-state">Carga tu historial para verlo aquí</div></div>
  </div>
</div>

<!-- PAGE: PROGRESO -->
<div class="page" id="page-progress">
  <div class="header">
    <h1>📈 Progreso</h1>
    <div class="header-sub">Evolución por ejercicio</div>
  </div>
  <div class="progress-body">
    <div class="progress-title">Selecciona un ejercicio</div>
    <select class="ex-select" id="ex-select" onchange="renderProgress()">
      <option value="">— Elige ejercicio —</option>
    </select>
    <div class="progress-chart" id="progress-chart">
      <div class="chart-empty">Carga el historial primero desde la pestaña Historial</div>
    </div>
    <div id="pr-cards"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('workout', this)"><span class="nav-icon">💪</span>Entreno</button>
  <button class="nav-btn" onclick="showPage('history', this)"><span class="nav-icon">📋</span>Historial</button>
  <button class="nav-btn" onclick="showPage('progress', this)"><span class="nav-icon">📈</span>Progreso</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyZmg7KnvomU4mqgLDF4cUqj4NB1AIqU_I6C_30bxJpog3ROHDBCalZ9j3WVd6aE_Jy/exec';

  const ROUTINE = [
    { name: 'Pecho + Tríceps', exercises: [
      { name: 'Press Banca Plano', target: '4×8 · 27.5kg/lado' },
      { name: 'Press Inclinado Barra', target: '4×8 · 65kg' },
      { name: 'Cruce de Poleas', target: '4×8-9 · 22.5kg' },
      { name: 'Extensión Cuerda', target: '4×8-9 · 32.5kg' },
      { name: 'Extensión Barra V', target: '4×9 · 32.5kg' },
      { name: 'Extensión Barra Recta', target: '4×8 · 32.5kg' },
    ]},
    { name: 'Espalda + Bíceps', exercises: [
      { name: 'Pullover Polea Alta', target: '4×10 · 30kg' },
      { name: 'Remo Polea Sentado', target: '4×8-9 · 45kg' },
      { name: 'Jalón al Pecho', target: '3×8-10' },
      { name: 'Cuerda desde Abajo', target: '4×10 · 30kg' },
      { name: 'Barra V', target: '4×8-9 · 30kg' },
      { name: 'Barra Recta', target: '4×8 · 30kg' },
    ]},
    { name: 'Hombros', exercises: [
      { name: 'Facepull', target: '4×8-10 · 22.5kg' },
      { name: 'Press Militar', target: '4×8 · 22kg/lado' },
      { name: 'Encogimientos (Shrugs)', target: '4×10 · 30kg' },
    ]},
    { name: 'Piernas', exercises: [
      { name: 'Press de Piernas', target: '4×10 · 165-180kg' },
      { name: 'Leg Extension', target: '4×9 · 50kg' },
      { name: 'Gemelos en Máquina', target: '4×10 · 180kg' },
    ]},
    { name: 'Full Body', exercises: [
      { name: 'Cruces en Polea', target: '4×8 · 22.5kg' },
      { name: 'Pullover Polea Alta', target: '2×10 · 30kg' },
      { name: 'Remo Polea Sentado', target: '2×8 · 45kg' },
      { name: 'Jalón al Pecho', target: '2×8-10' },
      { name: 'Facepull', target: '2×10 · 22.5kg' },
      { name: 'Press Militar', target: '2×8 · 22kg/lado' },
      { name: 'Cuerda desde Abajo', target: '2×10 · 30kg' },
      { name: 'Barra V', target: '2×9 · 30kg' },
      { name: 'Extensión Cuerda', target: '2×10 · 32.5kg' },
      { name: 'Extensión Barra V', target: '2×10 · 32.5kg' },
      { name: 'Press de Piernas', target: '2×10 · 165kg' },
      { name: 'Leg Extension', target: '2×9 · 50kg' },
    ]},
  ];

  let selectedDay = null;
  let workoutSets = {};
  let historyData = [];
  let historyFilter = 'all';

  function getToday() {
    return new Date().toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }

  function getTodayISO() {
    return new Date().toISOString().split('T')[0];
  }

  function showPage(page, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if (btn) btn.classList.add('active');
  }

  // RENDER DAY GRID
  function renderDayGrid() {
    document.getElementById('workout-date').textContent = getToday();
    document.getElementById('day-grid').innerHTML = ROUTINE.map((d, i) => `
      <button class="day-btn-sel ${selectedDay === i ? 'active' : ''}" onclick="selectDay(${i})">
        <div class="dbs-num">${i + 1}</div>
        <div class="dbs-name">${d.name}</div>
      </button>
    `).join('');
  }

  function selectDay(i) {
    selectedDay = i;
    if (!workoutSets[i]) {
      workoutSets[i] = ROUTINE[i].exercises.map(() => [{ weight: '', reps: '' }]);
    }
    renderDayGrid();
    renderExercises();
    document.getElementById('btn-save').disabled = false;
  }

  function renderExercises() {
    if (selectedDay === null) return;
    const day = ROUTINE[selectedDay];
    const sets = workoutSets[selectedDay];

    document.getElementById('exercise-list').innerHTML = day.exercises.map((ex, ei) => {
      const hasSets = sets[ei].some(s => s.weight || s.reps);
      const summary = hasSets ? summarizeSets(sets[ei]) : '';
      const prev = getPrevBest(ex.name);
      return `
        <div class="ex-card ${hasSets ? 'has-data' : ''} open" id="ex-${ei}">
          <div class="ex-header" onclick="toggleEx(${ei})">
            <div style="flex:1">
              <div class="ex-title">${ex.name}</div>
              <div class="ex-target">Objetivo: ${ex.target}</div>
              <div class="ex-summary" id="ex-summary-${ei}">${summary}</div>
            </div>
            <div class="ex-chevron">▼</div>
          </div>
          <div class="ex-body">
            <div class="sets-list" id="sets-${ei}">${renderSets(ei, sets[ei])}</div>
            <button class="btn-add-set" onclick="addSet(${ei})">+ Serie</button>
            ${prev ? `<div class="ex-prev">Mejor anterior: <span>${prev.weight}kg × ${prev.reps} reps</span> · ${prev.date}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderSets(ei, sets) {
    return sets.map((s, si) => `
      <div class="set-row">
        <div class="set-num">S${si + 1}</div>
        <div class="set-fields">
          <input class="set-input" type="number" placeholder="kg" value="${s.weight}"
            oninput="updateSet(${ei},${si},'weight',this.value)" step="0.5" min="0">
          <input class="set-input" type="number" placeholder="reps" value="${s.reps}"
            oninput="updateSet(${ei},${si},'reps',this.value)" min="0">
        </div>
        ${si > 0 ? `<button class="btn-del-set" onclick="removeSet(${ei},${si})">✕</button>` : '<div style="width:22px"></div>'}
      </div>
    `).join('');
  }

  function summarizeSets(sets) {
    const filled = sets.filter(s => s.weight || s.reps);
    if (!filled.length) return '';
    const maxW = Math.max(...filled.map(s => parseFloat(s.weight) || 0));
    return `${filled.length} series · max ${maxW}kg`;
  }

  function getPrevBest(exName) {
    if (!historyData.length) return null;
    const rows = historyData.slice(1).filter(r => r[2] === exName);
    if (!rows.length) return null;
    let best = null;
    rows.forEach(r => {
      if (!best || parseFloat(r[4]) > parseFloat(best.weight)) {
        best = { weight: r[4], reps: r[5], date: r[0] };
      }
    });
    return best;
  }

  function toggleEx(ei) {
    document.getElementById('ex-' + ei).classList.toggle('open');
  }

  function updateSet(ei, si, field, val) {
    workoutSets[selectedDay][ei][si][field] = val;
    // Update summary
    const hasSets = workoutSets[selectedDay][ei].some(s => s.weight || s.reps);
    const card = document.getElementById('ex-' + ei);
    card.classList.toggle('has-data', hasSets);
    const summaryEl = document.getElementById('ex-summary-' + ei);
    if (summaryEl) summaryEl.textContent = summarizeSets(workoutSets[selectedDay][ei]);
  }

  function addSet(ei) {
    workoutSets[selectedDay][ei].push({ weight: '', reps: '' });
    document.getElementById('sets-' + ei).innerHTML = renderSets(ei, workoutSets[selectedDay][ei]);
  }

  function removeSet(ei, si) {
    workoutSets[selectedDay][ei].splice(si, 1);
    document.getElementById('sets-' + ei).innerHTML = renderSets(ei, workoutSets[selectedDay][ei]);
  }

  // SAVE TO SHEETS
  async function saveWorkout() {
    if (selectedDay === null) return;
    const btn = document.getElementById('btn-save');
    const statusEl = document.getElementById('save-status');
    btn.disabled = true;
    statusEl.textContent = 'Guardando...'; statusEl.className = 'save-status';

    const day = ROUTINE[selectedDay];
    const sets = workoutSets[selectedDay];

    const exercises = day.exercises.map((ex, ei) => ({
      name: ex.name,
      sets: sets[ei].filter(s => s.weight || s.reps).map(s => ({
        weight: parseFloat(s.weight) || 0,
        reps: parseInt(s.reps) || 0
      }))
    })).filter(ex => ex.sets.length > 0);

    if (exercises.length === 0) {
      showToast('Añade al menos una serie primero');
      btn.disabled = false;
      statusEl.textContent = '';
      return;
    }

    try {
      await fetch(SHEETS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'workout',
          date: getTodayISO(),
          dayName: 'Día ' + (selectedDay + 1) + ' — ' + day.name,
          exercises
        })
      });
      statusEl.textContent = '✅ Guardado en Google Sheets';
      statusEl.className = 'save-status ok';
      showToast('✅ Entreno guardado');
    } catch(e) {
      statusEl.textContent = '❌ Error al guardar';
      statusEl.className = 'save-status err';
    } finally {
      btn.disabled = false;
    }
  }

  // LOAD HISTORY
  async function loadHistory() {
    const listEl = document.getElementById('history-list');
    listEl.innerHTML = '<div class="empty-state"><span class="spinner"></span> Cargando...</div>';
    try {
      const res = await fetch(SHEETS_URL + '?type=workout_history');
      const data = await res.json();
      historyData = data.data || [];
      renderHistory();
      renderFilterRow();
      populateExSelect();
    } catch(e) {
      listEl.innerHTML = '<div class="empty-state">Error cargando — revisa tu conexión</div>';
    }
  }

  function renderFilterRow() {
    const days = ['all', ...new Set(historyData.slice(1).map(r => r[1]))];
    const filterRow = document.getElementById('filter-row');
    filterRow.style.display = 'flex';
    filterRow.innerHTML = days.map(d => `
      <button class="filter-btn ${historyFilter === d ? 'active' : ''}" onclick="setFilter('${d}')">
        ${d === 'all' ? 'Todos' : d.replace('Día ', 'D')}
      </button>
    `).join('');
  }

  function setFilter(f) {
    historyFilter = f;
    renderFilterRow();
    renderHistory();
  }

  function renderHistory() {
    const listEl = document.getElementById('history-list');
    if (historyData.length <= 1) {
      listEl.innerHTML = '<div class="empty-state">No hay datos todavía</div>';
      return;
    }

    const rows = historyData.slice(1).filter(r => historyFilter === 'all' || r[1] === historyFilter);

    const grouped = {};
    rows.forEach(r => {
      const key = r[0] + '||' + r[1];
      if (!grouped[key]) grouped[key] = { date: r[0], dayName: r[1], exercises: {} };
      if (!grouped[key].exercises[r[2]]) grouped[key].exercises[r[2]] = [];
      grouped[key].exercises[r[2]].push({ set: r[3], weight: r[4], reps: r[5] });
    });

    const keys = Object.keys(grouped).sort().reverse();
    if (!keys.length) {
      listEl.innerHTML = '<div class="empty-state">No hay entrenos con ese filtro</div>';
      return;
    }

    listEl.innerHTML = keys.map(key => {
      const g = grouped[key];
      const exHtml = Object.entries(g.exercises).map(([name, sets]) => {
        const maxW = Math.max(...sets.map(s => parseFloat(s.weight) || 0));
        const totalSets = sets.length;
        return `
          <div class="history-ex">
            <span class="history-ex-name">${name}</span>
            <span class="history-ex-detail">${totalSets} series · <strong>${maxW}kg</strong></span>
          </div>
        `;
      }).join('');

      return `
        <div class="history-entry">
          <div class="history-date">
            <span>${g.date}</span>
            <span class="history-day-name">${g.dayName.replace('Día ', 'D').replace(' — ', ' · ')}</span>
          </div>
          ${exHtml}
        </div>
      `;
    }).join('');
  }

  // PROGRESS
  function populateExSelect() {
    const allExNames = [...new Set(historyData.slice(1).map(r => r[2]))].sort();
    const sel = document.getElementById('ex-select');
    sel.innerHTML = '<option value="">— Elige ejercicio —</option>' +
      allExNames.map(n => `<option value="${n}">${n}</option>`).join('');
  }

  function renderProgress() {
    const exName = document.getElementById('ex-select').value;
    const chartEl = document.getElementById('progress-chart');
    const prEl = document.getElementById('pr-cards');

    if (!exName) {
      chartEl.innerHTML = '<div class="chart-empty">Selecciona un ejercicio</div>';
      prEl.innerHTML = '';
      return;
    }

    const rows = historyData.slice(1).filter(r => r[2] === exName);
    if (!rows.length) {
      chartEl.innerHTML = '<div class="chart-empty">Sin datos para este ejercicio</div>';
      prEl.innerHTML = '';
      return;
    }

    // Max weight per date
    const byDate = {};
    rows.forEach(r => {
      const d = r[0];
      const w = parseFloat(r[4]) || 0;
      const reps = parseInt(r[5]) || 0;
      if (!byDate[d] || w > byDate[d].weight) byDate[d] = { weight: w, reps, date: d };
    });

    const dates = Object.keys(byDate).sort();
    const weights = dates.map(d => byDate[d].weight);
    const maxW = Math.max(...weights);
    const minW = Math.min(...weights);

    // Chart
    const bars = dates.map((d, i) => {
      const w = weights[i];
      const pct = maxW > 0 ? (w / maxW) * 100 : 50;
      const isNew = i > 0 && w > weights[i - 1];
      return `
        <div class="progress-bar-wrap">
          <div class="progress-bar-val">${w}</div>
          <div class="progress-bar-col" style="height:${pct}%;background:${isNew ? 'var(--green)' : 'var(--orange)'}"></div>
          <div class="progress-bar-label">${d.slice(5)}</div>
        </div>
      `;
    }).join('');

    chartEl.innerHTML = `<div class="progress-bars">${bars}</div>`;

    // PR cards
    const allTime = dates.reduce((best, d) => byDate[d].weight > (byDate[best]?.weight || 0) ? d : best, dates[0]);
    const trend = weights.length >= 2 ? weights[weights.length - 1] - weights[0] : 0;

    prEl.innerHTML = `
      <div class="pr-card">
        <div class="pr-icon">🏆</div>
        <div class="pr-info">
          <div class="pr-label">Récord personal</div>
          <div class="pr-val">${byDate[allTime].weight} kg × ${byDate[allTime].reps} reps</div>
          <div class="pr-date">${allTime}</div>
        </div>
      </div>
      <div class="pr-card">
        <div class="pr-icon">${trend >= 0 ? '📈' : '📉'}</div>
        <div class="pr-info">
          <div class="pr-label">Progreso total</div>
          <div class="pr-val" style="color:${trend >= 0 ? 'var(--green)' : 'var(--red)'}">
            ${trend >= 0 ? '+' : ''}${trend.toFixed(1)} kg
          </div>
          <div class="pr-date">${dates[0]} → ${dates[dates.length - 1]}</div>
        </div>
      </div>
    `;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.addEventListener('DOMContentLoaded', renderDayGrid);
</script>
</body>
</html>
